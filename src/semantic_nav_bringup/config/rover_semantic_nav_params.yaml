# Rover Nav2 params for the AWS-sim semantic stack.
#
# Kept deliberately in step with nav2_semantic_params.yaml (the TurtleBot3 stack)
# so a run on the ugv_rover is comparable to a run on TB3. Everything that is NOT
# a genuine platform difference is identical to that file.
#
# Rover-specific deltas (do not "fix" these back to the TB3 values):
#   - robot_base_frame: base_footprint for bt_navigator/behavior_server (ugv URDF).
#   - robot_radius 0.1 (the rover is physically smaller than the Waffle).
#   - RotationShimController wrapping DWB (Waveshare's tuning for a diff-drive
#     rover with a narrow track).
#   - local_costmap uses obstacle_layer/scan, not TB3's voxel_layer: the rover
#     publishes no /camera/ground + /camera/obstacles clouds.
#   - controller_frequency 10 Hz (Waveshare tuning).
#
# semantic_nav_nav2_plugins is appended to bt_navigator.plugin_lib_names so the
# BT-led recovery tree (semantic_recovery_bt.xml: ValidateSemantic,
# CaptureBlockageContext, PathClearCondition, QuerySemanticContext,
# EmitObstacleSignal, EscalateToLLMRecovery, OperatorPrompt) loads on the rover.
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      - semantic_nav_nav2_plugins

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # PoseProgressChecker, NOT SimpleProgressChecker (which is what TB3 uses).
    #
    # SimpleProgressChecker only counts TRANSLATION, and this rover drives behind a
    # RotationShimController: whenever the path needs more than angular_dist_threshold
    # (0.785 rad = 45 deg) of heading change, the shim rotates IN PLACE first, moving
    # 0 m. The rover is skid-steer and delivers only ~0.47x the commanded rotation, so
    # a 180 deg turn burns ~6.7 s with zero translation, then still needs ~1.9 s to
    # cover 0.5 m — 8.6 s of a 10 s allowance. Any replan mid-turn tips it over and
    # the controller aborts a path it was following perfectly well.
    #
    # Observed exactly this: navigating to refrigerator:6 from an ANGLED pose aborted
    # twice ("Failed to make progress" x3 then x6, DWB reporting zero trajectory
    # failures, planner returning path_length=10.862); teleoping the rover straight and
    # re-issuing the SAME goal (path_length=10.866) succeeded with zero failures.
    #
    # PoseProgressChecker accepts rotation OR translation as progress, so an in-place
    # turn is no longer mistaken for being stuck. required_movement_angle is the
    # rotation that resets the watchdog.
    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.5
      required_movement_angle: 0.5
      movement_time_allowance: 15.0
    # Goal checker parameters
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    # DWB parameters, behind the rotation shim (rover turns in place before
    # committing to a path; DWB alone oscillates on this chassis).
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 3.2
      simulate_ahead_time: 1.0
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.26
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0
      # NOT Waveshare's (acc_lim_theta 0.5, decel -0.5). DWB samples only the
      # velocities reachable from the CURRENT measured one within a control period,
      # so acc_lim_theta is a hard cap on what it can command: at 10 Hz, 0.5 rad/s^2
      # allows just +/-0.05 rad/s per cycle. On this skid-steer that deadlocks --
      # DWB commands ~0.02 rad/s, the chassis under-delivers (~0.006 rad/s measured),
      # so the next cycle samples +/-0.05 around ~0 again and the rotation can NEVER
      # ramp up. Measured live 2026-07-14: parked beside the 1.0 m doorway at
      # (-3.02,-0.91), cmd_vel_nav = linear 0.0 / angular -0.019 until the progress
      # checker aborted -- it read as "the rover cannot fit through the gap" when in
      # fact it could not TURN. behavior_server's Spin drives the same chassis fine at
      # rotational_acc_lim 3.2, so give DWB the same authority.
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 40
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.1
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # 0.35, not Waveshare's 0.55: 0.55 leaves zero free cells in the ~0.9 m
        # AWS Small House doorways, so the planner can never route through one
        # even with the door open, and every blockage recovery is unfalsifiable.
        inflation_radius: 0.35
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # Clearing reaches FURTHER than marking, so the rover can free stale cells
          # it can see past but only marks obstacles where the depth scan is still
          # trustworthy. Safe in BOTH rover modes: rays terminate at the real return,
          # so with the 3.5 m LiDAR (depth_only:=false) nothing beyond 3.5 m is ever
          # traced or marked; with the depth scan they extend to its 8.0 m range_max.
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.1
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        footprint_clearing_enabled: true
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          # Same reasoning as the local costmap: clearing reaches further than
          # marking, and rays terminate at the real return so this is safe with the
          # 3.5 m LiDAR as well as the 8.0 m depth scan.
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    # SmacPlanner2D, NOT NavFn. NavFn builds a potential field and then extracts the
    # path by walking its GRADIENT -- and that second stage fails in a narrow doorway,
    # where the potential between the two inflation walls is flat and the gradient has
    # no clear downhill direction. Measured live 2026-07-14: routing the rover out of
    # the bedroom through the 0.95 m gap, NavFn reported
    #   "Failed to create a plan from potential when a legal potential was found."
    # i.e. it PROVED a path exists and then could not trace it. A flood fill from the
    # rover reached the goal through 56854 cells, confirming the route was open. The
    # narrow gap is the whole point of this scenario, so the planner must be a real
    # search: SmacPlanner2D runs A* on the grid and emits the path directly, with no
    # gradient-descent extraction step to fail.
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      # The BT replans at 1 Hz, so planning must finish well inside a cycle.
      max_planning_time: 0.5
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# Humble's server is behavior_server / nav2_behaviors (the Galactic-era
# recoveries_server / nav2_recoveries block Waveshare ships is silently ignored,
# which left drive_on_heading unconfigured under the default Nav2 tree).
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # Speed caps track the rover (max_vel_x 0.26, max_vel_theta 1.0), but the
    # ACCEL/DECEL limits must NOT be taken from Waveshare's DWB block. Those
    # (acc_lim_theta 0.5, decel_lim_theta -0.5) are DWB trajectory-SAMPLING limits
    # for path following, not actuator limits. Feeding them to the smoother caps
    # angular decel at 0.5 rad/s^2 while behavior_server's Spin plans with
    # rotational_acc_lim 3.2 — so when Spin commands stop, the smoother takes 2 s to
    # wind down and sweeps up to 57 deg PAST the target. Measured: a 40 deg spin
    # turned 68 deg. The smoother must never be more restrictive than the behaviors
    # commanding through it, so match behavior_server (3.2) and Nav2's own defaults.
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
