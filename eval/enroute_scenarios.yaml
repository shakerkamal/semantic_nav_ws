# Scenario constants for the BT-LLM en-route recovery ablation (Ch7 s7.5).
# Poses are map-frame == world-frame (robot spawns at the world origin).
# RE-SURVEY before the grid: folding doors moved 2026-07-12 — narrow gap
# panel pose (-2.507, -1.350); kitchen gap door:119 at (4.862, -0.677).

common:
  perception_range_m: 3.0  # camera-like detection radius for mock detector
  detect_rate_hz: 2.0
  ttl_sec: 5.0  # dynamic-overlay TTL; expiry = no longer perceived
  blocker_state_topic: /enroute_scenario/blocker_state
  operator_action_request_topic: /operator_action_request
  operator_action_completion_topic: /operator_action_completion
  # One mock-detector cycle after Gazebo confirms deletion. This lets fresh
  # depth/scan observations arrive before the BT clears costmaps and replans.
  operator_action_settle_sec: 0.5

scenarios:
  S1:  # geometric route-around negative control — no perception, no LLM
    # expected. A compact bucket (0.4 m dia) drops in OPEN floor just before
    # the kitchen doorway; Nav2's 1 Hz replanning detours around it and
    # reaches the fridge WITHOUT semantic escalation. resolving_tier none
    # (pure replan) OR T2 (a costmap clear) both count as expected; any T3/LLM
    # line is a failure of the control.
    goal_query: "refrigerator:6"
    nl_command: ""
    intent_hint: ""
    trigger: {axis: x, threshold: 2.0, direction: increasing}
    blocker:
      entity: scenario_bucket
      kind: sdf_file
      model: bucket.sdf
      pose: [3.621, -0.542, 0.0]
    delete_after_sec: 0.0
    detector: null
    expected_directive: none

  S2:  # closed kitchen door, perceived as a live semantic object
    goal_query: "refrigerator:6"
    nl_command: ""
    intent_hint: ""
    trigger: {axis: x, threshold: 2.0, direction: increasing}
    blocker:
      # Entity differs from the database model name so Gazebo deletion can
      # address the inserted model deterministically.
      entity: scenario_door
      kind: database
      model: aws_robomaker_residential_Door_01
      pose: [4.8622, -0.6772, -1.5577]
    delete_after_sec: 0.0
    detector:
      object_key: "door:903"
      tag: door
      caption: >-
        The doorway connecting the hallway to the kitchen, near the
        refrigerator and counter, now standing closed.
      state: semi-static
      extent: [0.2, 0.9, 2.0]
    expected_directive: open_door_then_replan

  S3:  # clearable chair seals the narrow gap — detected at encounter
    goal_query: "bed:120"
    nl_command: "I want to rest"
    intent_hint: "sleeping or resting"
    trigger: {axis: x, threshold: -1.0, direction: decreasing}
    blocker:
      entity: scenario_chair
      kind: database
      model: aws_robomaker_residential_ChairA_01
      pose: [-2.507, -1.350, 1.5708]
    delete_after_sec: 0.0
    detector:
      object_key: "chair:901"
      tag: chair
      caption: >-
        A wooden chair standing in the middle of the narrow passage between
        the folding screens; it can be picked up and moved aside.
      state: movable
      extent: [0.5, 0.5, 0.9]
    expected_directive: clear_object_then_replan

  S4:  # person in the gap — safety scenario, leaves after a fixed delay
    goal_query: "bed:120"
    nl_command: "I want to rest"
    intent_hint: "sleeping or resting"
    trigger: {axis: x, threshold: -1.0, direction: decreasing}
    blocker:
      entity: scenario_person
      kind: sdf_file
      model: person_scenario.sdf
      pose: [-2.507, -1.350, 0.0]
    delete_after_sec: 40.0
    detector:
      object_key: "person:902"
      tag: person
      caption: "A person standing in the narrow passage, facing the robot."
      state: movable
      extent: [0.9, 0.9, 1.7]
    expected_directive: wait_then_replan

  S5:  # sealed target region, deliberately unattributed blocker
    goal_query: "bed:120"
    nl_command: "I want to rest"
    intent_hint: "sleeping or resting"
    trigger: {axis: x, threshold: -1.0, direction: decreasing}
    blocker:
      entity: sealed_barrier
      kind: sdf_file
      model: door_scenario_panel.sdf
      pose: [-2.507, -1.350, 1.5708]
    delete_after_sec: 0.0
    detector: null
    expected_directive: retry_target